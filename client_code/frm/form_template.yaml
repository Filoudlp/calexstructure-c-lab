components: []
container:
  properties:
    html: |
      <div class="app-container">

        <!-- ═══════════════════════════════════════════ -->
        <!-- TITRE -->
        <!-- ═══════════════════════════════════════════ -->
        <div class="header">
          <h1>CALCUL DE SECTION BÉTON ARMÉ</h1>
          <p class="header-sub">Flexion simple & composée — Eurocode 2</p>
        </div>

        <!-- ═══════════════════════════════════════════ -->
        <!-- DONNÉES D'ENTRÉE -->
        <!-- ═══════════════════════════════════════════ -->
        <div class="input-container">
          <h2>Données d'entrée</h2>

          <div class="cards-row">

            <!-- ─────────── COLONNE 1 : GÉOMÉTRIE ─────────── -->
            <div class="card">
              <div class="card-header">
                <div class="card-icon geo-icon">&#9654;</div>
                <div>
                  <h3>GÉOMÉTRIE</h3>
                  <p class="subtitle">Définition de la section</p>
                </div>
              </div>

              <label>TYPE DE SECTION</label>
              <div class="field-row">
                <select anvil-name="dd_section">
                  <option>Rectangulaire</option>
                  <option>Circulaire</option>
                  <option>En T</option>
                </select>
              </div>

              <label>LARGEUR B</label>
              <div class="field-row">
                <input anvil-name="tb_largeur_b" type="number" value="30"/>
                <span class="unit">cm</span>
              </div>

              <label>HAUTEUR H</label>
              <div class="field-row">
                <input anvil-name="tb_hauteur_h" type="number" value="50"/>
                <span class="unit">cm</span>
              </div>

              <label>ENROBAGE C</label>
              <div class="field-row">
                <input anvil-name="tb_enrobage" type="number" value="3"/>
                <span class="unit">cm</span>
              </div>

              <!-- Aperçu section -->
              <div class="section-preview" anvil-name="canvas_section">
                <div class="preview-placeholder">Aperçu section</div>
              </div>
            </div>

            <!-- ─────────── COLONNE 2 : MATÉRIAUX ─────────── -->
            <div class="card">
              <div class="card-header">
                <div class="card-icon mat-icon">E</div>
                <div>
                  <h3>MATÉRIAUX</h3>
                  <p class="subtitle">Propriétés des matériaux</p>
                </div>
              </div>

              <label>CLASSE DE BÉTON</label>
              <div class="field-row">
                <select anvil-name="dd_classe_beton">
                  <option value="20">C20/25</option>
                  <option value="25" selected>C25/30</option>
                  <option value="30">C30/37</option>
                  <option value="35">C35/45</option>
                  <option value="40">C40/50</option>
                  <option value="45">C45/55</option>
                  <option value="50">C50/60</option>
                </select>
              </div>

              <label>RÉSISTANCE BÉTON FCK</label>
              <div class="field-row">
                <input anvil-name="tb_fck" type="number" value="25"/>
                <span class="unit">MPa</span>
              </div>

              <label>COEFFICIENT PARTIEL BÉTON γC</label>
              <div class="field-row">
                <input anvil-name="tb_gamma_c" type="number" step="0.01" value="1.50"/>
                <span class="unit">—</span>
              </div>

              <div class="separator"></div>

              <label>LIMITE ÉLASTIQUE ACIER FYK</label>
              <div class="field-row">
                <input anvil-name="tb_fyk" type="number" value="500"/>
                <span class="unit">MPa</span>
              </div>

              <label>COEFFICIENT PARTIEL ACIER γS</label>
              <div class="field-row">
                <input anvil-name="tb_gamma_s" type="number" step="0.01" value="1.15"/>
                <span class="unit">—</span>
              </div>

              <label>MODULE DE YOUNG ACIER ES</label>
              <div class="field-row">
                <input anvil-name="tb_es" type="number" value="200000"/>
                <span class="unit">MPa</span>
              </div>
            </div>

            <!-- ─────────── COLONNE 3 : SOLLICITATION ─────────── -->
            <div class="card">
              <div class="card-header">
                <div class="card-icon sol-icon">&#9889;</div>
                <div>
                  <h3>SOLLICITATION</h3>
                  <p class="subtitle">Efforts appliqués ELU</p>
                </div>
              </div>

              <label>MOMENT FLÉCHISSANT MED</label>
              <div class="field-row">
                <input anvil-name="tb_med" type="number" value="150"/>
                <span class="unit">kN.m</span>
              </div>

              <label>EFFORT NORMAL NED</label>
              <div class="field-row">
                <input anvil-name="tb_ned" type="number" value="0"/>
                <span class="unit">kN</span>
              </div>

              <p class="field-note">Positif = compression · Négatif = traction</p>

              <div class="separator"></div>

              <div class="checkbox-row">
                <input anvil-name="cb_options_avancees" type="checkbox"/>
                <span>Options avancées</span>
              </div>

              <div class="advanced-options" anvil-name="pnl_advanced" style="display:none;">

                <label>CLASSE D'EXPOSITION</label>
                <div class="field-row">
                  <select anvil-name="dd_classe_expo">
                    <option>XC1</option>
                    <option>XC2</option>
                    <option selected>XC3</option>
                    <option>XC4</option>
                    <option>XD1</option>
                    <option>XD2</option>
                    <option>XS1</option>
                  </select>
                </div>

                <label>NUANCE ACIER</label>
                <div class="field-row">
                  <select anvil-name="dd_nuance">
                    <option>B</option>
                    <option>C</option>
                  </select>
                </div>

                <label>DÉFORMATION ULTIME ACIER εUD</label>
                <div class="field-row">
                  <input anvil-name="tb_eud" type="number" step="0.001" value="0.01"/>
                  <span class="unit">—</span>
                </div>

                <label>COEFFICIENT α CC</label>
                <div class="field-row">
                  <input anvil-name="tb_alpha_cc" type="number" step="0.01" value="1.00"/>
                  <span class="unit">—</span>
                </div>

              </div>
            </div>

          </div>

          <!-- BOUTON CALCULER -->
          <div class="btn-row">
            <button class="btn-calculer">CALCULER</button>
          </div>
        </div>

        <!-- ═══════════════════════════════════════════ -->
        <!-- RÉSULTATS -->
        <!-- ═══════════════════════════════════════════ -->
        <div class="results-container" anvil-name="pnl_results" style="display:none;">
          <h2>Résultats</h2>

          <div class="cards-row">

            <!-- ─────────── RÉSULTATS BÉTON ─────────── -->
            <div class="card card-result">
              <div class="card-header">
                <div class="card-icon res-icon">&#10004;</div>
                <div>
                  <h3>BÉTON</h3>
                  <p class="subtitle">Vérification section</p>
                </div>
              </div>

              <div class="result-line">
                <span class="result-label">fcd</span>
                <span class="result-value" anvil-name="res_fcd">—</span>
                <span class="result-unit">MPa</span>
              </div>

              <div class="result-line">
                <span class="result-label">Moment réduit μbu</span>
                <span class="result-value" anvil-name="res_mu">—</span>
                <span class="result-unit">—</span>
              </div>

              <div class="result-line">
                <span class="result-label">μbu limite</span>
                <span class="result-value" anvil-name="res_mu_lim">—</span>
                <span class="result-unit">—</span>
              </div>

              <div class="result-line">
                <span class="result-label">Position axe neutre αu</span>
                <span class="result-value" anvil-name="res_alpha">—</span>
                <span class="result-unit">—</span>
              </div>

              <div class="result-line">
                <span class="result-label">Bras de levier z</span>
                <span class="result-value" anvil-name="res_z">—</span>
                <span class="result-unit">cm</span>
              </div>
            </div>

            <!-- ─────────── RÉSULTATS ACIER ─────────── -->
            <div class="card card-result">
              <div class="card-header">
                <div class="card-icon res-icon">&#9878;</div>
                <div>
                  <h3>ARMATURES</h3>
                  <p class="subtitle">Sections d'acier</p>
                </div>
              </div>

              <div class="result-line">
                <span class="result-label">fyd</span>
                <span class="result-value" anvil-name="res_fyd">—</span>
                <span class="result-unit">MPa</span>
              </div>

              <div class="result-line">
                <span class="result-label">Hauteur utile d</span>
                <span class="result-value" anvil-name="res_d">—</span>
                <span class="result-unit">cm</span>
              </div>

              <div class="result-line highlight">
                <span class="result-label">As requis</span>
                <span class="result-value" anvil-name="res_as">—</span>
                <span class="result-unit">cm²</span>
              </div>

              <div class="result-line">
                <span class="result-label">As min</span>
                <span class="result-value" anvil-name="res_as_min">—</span>
                <span class="result-unit">cm²</span>
              </div>

              <div class="result-line">
                <span class="result-label">As max</span>
                <span class="result-value" anvil-name="res_as_max">—</span>
                <span class="result-unit">cm²</span>
              </div>

              <div class="result-line">
                <span class="result-label">Ratio acier</span>
                <span class="result-value" anvil-name="res_ratio">—</span>
                <span class="result-unit">kg/m³</span>
              </div>
            </div>

            <!-- ─────────── STATUT / PROPOSITION ─────────── -->
            <div class="card card-result">
              <div class="card-header">
                <div class="card-icon res-icon">&#9881;</div>
                <div>
                  <h3>SYNTHÈSE</h3>
                  <p class="subtitle">Vérification & choix barres</p>
                </div>
              </div>

              <div class="result-line statut-line">
                <span class="result-label">Statut</span>
                <span class="result-value result-statut" anvil-name="res_statut">—</span>
              </div>

              <div class="result-line">
                <span class="result-label">Pivot</span>
                <span class="result-value" anvil-name="res_pivot">—</span>
              </div>

              <div class="separator"></div>

              <div class="result-line">
                <span class="result-label">Proposition barres</span>
                <span class="result-value" anvil-name="res_barres">—</span>
              </div>

              <div class="result-line">
                <span class="result-label">As fourni</span>
                <span class="result-value" anvil-name="res_as_fourni">—</span>
                <span class="result-unit">cm²</span>
              </div>

              <div class="result-line">
                <span class="result-label">Marge</span>
                <span class="result-value" anvil-name="res_marge">—</span>
                <span class="result-unit">%</span>
              </div>
            </div>

          </div>
        </div>

      </div>
    visible: true
  type: HtmlTemplate
custom_component: true
is_package: true
