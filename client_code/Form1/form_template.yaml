components: []
container:
  properties:
    html: |
      <div class="input-container">
        <style>
          .input-container {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
          }

          .input-container h2 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 24px;
          }

          .cards-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
          }

          .card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 24px;
            background: #fff;
          }

          .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
          }

          .card-icon {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
          }

          .geo-icon { background: #1a1a2e; }
          .mat-icon { background: #1a1a2e; }
          .sol-icon { background: #1a1a2e; color: #f5a623; }

          .card h3 {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 0;
          }

          .subtitle {
            font-size: 12px;
            color: #888;
            margin: 0;
          }

          label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 0.5px;
            margin-top: 16px;
            margin-bottom: 6px;
          }

          .field-row {
            display: flex;
            align-items: center;
            gap: 8px;
          }

          .field-row input,
          .field-row select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            color: #333;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
          }

          .field-row input:focus,
          .field-row select:focus {
            border-color: #1a1a2e;
          }

          .unit {
            font-size: 13px;
            color: #888;
            min-width: 30px;
          }

          .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            margin-bottom: 8px;
          }

          .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #1a1a2e;
          }

          .checkbox-row span {
            font-size: 13px;
            font-weight: 600;
            color: #1a1a2e;
          }

          .section-preview {
            margin-top: 16px;
            width: 100%;
            height: 200px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #fafafa;
          }

          .btn-row {
            text-align: center;
            margin-top: 20px;
          }

          .btn-calculer {
            background: #1a1a2e;
            color: #fff;
            border: none;
            padding: 14px 48px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: background 0.2s;
          }

          .btn-calculer:hover {
            background: #2d2d4e;
          }

        </style>
        <h2>Données d'entrée</h2>

        <div class="cards-row">

          <!-- COLONNE 1 : GÉOMÉTRIE -->
          <div class="card">
            <div class="card-header">
              <div class="card-icon geo-icon">&#9654;</div>
              <div>
                <h3>GÉOMÉTRIE</h3>
                <p class="subtitle">Définition de la section</p>
              </div>
            </div>

            <label>TYPE DE SECTION</label>
            <div class="field-row">
              <select anvil-name="dd_section">
                <option>Rectangulaire</option>
                <option>Circulaire</option>
                <option>En T</option>
              </select>
            </div>

            <label>LARGEUR B</label>
            <div class="field-row">
              <input anvil-name="tb_largeur_b" type="number" value="30"/>
              <span class="unit">cm</span>
            </div>

            <label>HAUTEUR H</label>
            <div class="field-row">
              <input anvil-name="tb_hauteur_h" type="number" value="50"/>
              <span class="unit">cm</span>
            </div>

            <!-- Zone de dessin section -->
            <div class="section-preview" anvil-name="canvas_section">
            </div>
          </div>

          <!-- COLONNE 2 : MATÉRIAUX -->
          <div class="card">
            <div class="card-header">
              <div class="card-icon mat-icon">E</div>
              <div>
                <h3>MATÉRIAUX</h3>
                <p class="subtitle">Propriétés des matériaux</p>
              </div>
            </div>

            <label>LIMITE ÉLASTIQUE ACIER FYK</label>
            <div class="field-row">
              <input anvil-name="tb_fyk" type="number" value="500"/>
              <span class="unit">MPa</span>
            </div>
          </div>

          <!-- COLONNE 3 : SOLLICITATION -->
          <div class="card">
            <div class="card-header">
              <div class="card-icon sol-icon">&#9889;</div>
              <div>
                <h3>SOLLICITATION</h3>
                <p class="subtitle">Efforts appliqués</p>
              </div>
            </div>

            <label>EFFORT NORMAL NED</label>
            <div class="field-row">
              <input anvil-name="tb_ned" type="number" value="1000"/>
              <span class="unit">kN</span>
            </div>

            <div class="checkbox-row">
              <input anvil-name="cb_options_avancees" type="checkbox" checked/>
              <span>Options avancées</span>
            </div>

            <div class="advanced-options" anvil-name="pnl_advanced">
              <label>MODULE DE YOUNG ACIER ES</label>
              <div class="field-row">
                <input anvil-name="tb_es" type="number" value="200000"/>
                <span class="unit">MPa</span>
              </div>

              <label>NUANCE</label>
              <div class="field-row">
                <select anvil-name="dd_nuance">
                  <option>B</option>
                  <option>C</option>
                </select>
              </div>

              <label>DÉFORMATION ULTIME ACIER EUD</label>
              <div class="field-row">
                <input anvil-name="tb_eud" type="number" step="0.001" value="0.01"/>
                <span class="unit">-</span>
              </div>

              <label>COEFFICIENT PARTIEL ACIER γS</label>
              <div class="field-row">
                <input anvil-name="tb_gamma_s" type="number" step="0.01" value="1.15"/>
                <span class="unit">-</span>
              </div>
            </div>
          </div>

        </div>

        <div class="btn-row">
          <button anvil-name="btn_calculer" class="btn-calculer">CALCULER</button>
        </div>
      </div>
  type: HtmlTemplate
is_package: true
